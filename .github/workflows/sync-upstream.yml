name: Sync Forks with Upstream

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync-forks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Sync forks with upstream
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const UPSTREAM_OWNER = 'fossasia';
            const UPSTREAM_REPO = 'scrum_helper';

            const MAX_FORKS = 100;
            const ACTIVE_DAYS = 30;

            let syncedCount = 0;
            let skippedCount = 0;
            let errorCount = 0;
            let permissionErrors = 0;

            const delay = ms => new Promise(res => setTimeout(res, ms));

            async function retry(fn, retries = 2) {
              for (let i = 0; i <= retries; i++) {
                try {
                  return await fn();
                } catch (err) {
                  if (i === retries) throw err;

                  console.log(`Retrying... (${i + 1})`);
                  await delay(1000);
                }
              }
            }

            try {
              const { data: upstreamRepo } = await github.rest.repos.get({
                owner: UPSTREAM_OWNER,
                repo: UPSTREAM_REPO
              });

              const upstreamBranch = upstreamRepo.default_branch;

              console.log(`🔍 Fetching forks...`);

              const forks = [];
              const now = Date.now();
              let scannedForks = 0;

              // Fetch forks page-by-page and stop once we have enough active forks
              outer:
              for await (const { data: page } of github.paginate.iterator(
                github.rest.repos.listForks,
                {
                  owner: UPSTREAM_OWNER,
                  repo: UPSTREAM_REPO,
                  per_page: 100
                }
              )) {
                for (const fork of page) {
                  scannedForks++;

                  const updatedRecently =
                    new Date(fork.updated_at).getTime() >
                    (now - ACTIVE_DAYS * 24 * 60 * 60 * 1000);

                  if (!fork.archived && updatedRecently) {
                    forks.push(fork);

                    if (forks.length >= MAX_FORKS) {
                      break outer;
                    }
                  }
                }
              }

              console.log(`📦 Forks scanned: ${scannedForks}`);
              console.log(
                `⚡ Active forks collected (last ${ACTIVE_DAYS} days): ${forks.length}`
              );
              console.log(`🚀 Processing first ${forks.length} forks`);

              for (const fork of forks) {
                try {
                  console.log(`\n➡️ Processing: ${fork.full_name}`);

                  const comparison = await retry(() =>
                    github.rest.repos.compareCommitsWithBasehead({
                      owner: fork.owner.login,
                      repo: fork.name,
                      basehead: `${UPSTREAM_OWNER}:${upstreamBranch}...${fork.default_branch}`
                    })
                  );

                  const status = comparison.data.status;

                  if (status === 'identical') {
                    console.log(`✅ Up to date`);
                    continue;
                  }

                  if (status === 'ahead' || status === 'diverged') {
                    console.log(`⏭ Skipped (${status})`);
                    skippedCount++;
                    continue;
                  }

                  if (status === 'behind') {
                    await retry(() =>
                      github.rest.repos.mergeUpstream({
                        owner: fork.owner.login,
                        repo: fork.name,
                        branch: fork.default_branch
                      })
                    );

                    console.log(`🔄 Synced successfully`);
                    syncedCount++;
                  }

                  await delay(1000);

                } catch (error) {
                  const errorMessage = String(error?.message ?? error);

                  if (errorMessage.includes('Resource not accessible')) {
                    permissionErrors++;
                    console.log(`🔒 Permission denied`);
                  } else {
                    console.log(`❌ Error: ${errorMessage}`);
                    errorCount++;
                  }
                }
              }

              console.log(`\n📊 ===== Summary =====`);
              console.log(`✅ Synced: ${syncedCount}`);
              console.log(`⏭ Skipped: ${skippedCount}`);
              console.log(`🔒 Permission issues: ${permissionErrors}`);
              console.log(`❌ Errors: ${errorCount}`);

            } catch (error) {
              console.error(
                `🚨 Workflow failed: ${String(error?.message || error)}`
              );

              throw error;
            }